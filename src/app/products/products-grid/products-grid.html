<div class="products-container">
  <p class="m-3">Total products: {{ products().length }}</p>

  <div class="grid gap-4 grid-cols-[repeat(auto-fill,minmax(280px,1fr))]">
    @for (product of products(); track product.id) {
      <app-product-card />
    } @empty {
      <div class="col-span-full flex flex-col items-center justify-center py-16 px-8 text-center">
        <mat-icon class="text-[4rem] w-16 h-16 text-(--mat-sys-outline) mb-4">inventory_3</mat-icon>
        <h3 class="m-0 mb-2 text-(--mat-sys-on-surface)">No products available</h3>
        <p class="m-0 text-(--mat-sys-on-surface-variant)">Check back later for new arrivals!</p>
      </div>
    }
  </div>
</div>
