<mat-card class="h-4/4 flex flex-col">
  <mat-card-header>
    <mat-card-title>{{ product().name }}</mat-card-title>
  </mat-card-header>
  <mat-card-content class="flex-1">
    @if (product().originalPrice) {
      <span
        class="inline-block mb-3 py-1 px-2 rounded-full text-xs font-semibold text-(--mat-sys-on-primary) bg-(--mat-sys-primary)"
        >On Sale</span
      >
      <p class="flex items-baseline gap-2 m-0 mb-3">
        <span class="font-bold text-(--mat-sys-primary)">{{ product().price }}</span>
        <span class="text-(--mat-sys-on-surface-variant) line-through">{{ product().originalPrice }}</span>
      </p>
    } @else {
      <p class="flex items-baseline gap-2 m-0 mb-3">
        <span class="font-bold text-(--mat-sys-primary)">{{ product().price }}</span>
      </p>
    }

    <p>{{ product().description }}</p>
  </mat-card-content>

  <mat-card-actions>
    <button matButton>{{ addButtonLabel() }}</button>
  </mat-card-actions>
</mat-card>
