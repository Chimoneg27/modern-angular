<mat-toolbar class="px-1.5 relative shadow-[0_1px_8px_rgba(0,0,0,0.3)] z-9">
  <button matButton>
    <mat-icon aria-hidden="false" aria-label="Example home icon"
      fontIcon="home"></mat-icon>
  </button>

  <span class="flex truncate my-auto leading-12.5 pl-2 pr-16">Modern
    Angular</span>

  <span class="spacer flex-auto"></span>

  <button matButton>Products</button>

  <button matButton>
    <mat-icon [matBadge]="cartService.totalItems()" aria-hidden="false"
    [matBadgeHidden]="cartService.totalItems() === 0"
      aria-label="Cart"
      fontIcon="shopping_cart">
    </mat-icon>
  </button>
</mat-toolbar>
